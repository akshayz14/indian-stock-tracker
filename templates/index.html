<!DOCTYPE html>
<html>
<head>
    <title>Indian Stock Tracker DB Browser</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Database Overview</h1>
        <p>Total Stocks: {{ stats.total_stocks }}</p>
        <p>Total Price Records: {{ stats.total_prices }}</p>
        <p>Total Suggestions: {{ stats.total_suggestions }}</p>
        <p>Latest Data: {{ stats.latest_date|default('No data yet') }}</p>
        <a href="/stocks">View All Stocks</a>
    </div>
</body>
</html>
